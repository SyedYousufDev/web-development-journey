<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Form</title>
    <style>
        /* Define the fade-in animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        function validateUrl() {
            var searchInput = document.getElementById("youtube_search").value;
            if (searchInput.includes("youtube.com")) {
                return true; // Allow form submission
            } else {
                alert("Kindly enter only a YouTube URL");
                return false; // Prevent form submission
            }
        }
    </script>
</head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color:lightgreen; margin: 0; padding: 400px; box-sizing: border-box; display:flex; flex-direction: column; align-items: center; text-align: left;">
    <h1 style="color: #333; margin-bottom: 20px; text-align: center; width: 100%;">Form</h1>
    
    <form action="/action" style="width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); transition: transform 3s ease-in-out; animation: fadeIn 2s ease-out; margin-bottom: 20px;">
        <div style="margin-bottom: 20px;">
            <label for="username" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">Username :</label>
            <input type="text" id="username" placeholder="Enter username" name="user" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s ease-in-out;" onfocus="this.style.borderColor='#007bff';" onblur="this.style.borderColor='#ccc';">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="pass" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">Password :</label>
            <input type="password" id="pass" placeholder="Enter password" name="pass" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s ease-in-out;" onfocus="this.style.borderColor='#007bff';" onblur="this.style.borderColor='#ccc';">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label for="num" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">Mobile # :</label>
            <input type="number" id="num" placeholder="Enter mobile no" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s ease-in-out;" onfocus="this.style.borderColor='#007bff';" onblur="this.style.borderColor='#ccc';">
        </div>

        <div style="margin-bottom: 20px;">
            <label for="dat" style="display: block; margin-bottom: 8px; font-weight: 600; color: #555;">Date :</label>
            <input type="date" id="dat" placeholder="Enter date" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s ease-in-out;" onfocus="this.style.borderColor='#007bff';" onblur="this.style.borderColor='#ccc';">
        </div>

        <div style="display: flex; justify-content: space-between; gap: 10px;">
            <button type="submit" style="flex-grow: 1; padding: 12px; border: none; border-radius: 8px; background-image: linear-gradient(to right, #007bff, #0056b3); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;" onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">Submit</button>
            <button type="reset" style="flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; background-color: #f8f9fa; color: #555; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease-in-out;" onmouseover="this.style.transform='translateY(-2px)';" onmouseout="this.style.transform='translateY(0)';">Reset</button>
        </div>
        <input type="submit" value="Click me" style="display: none;">
    </form>
    
    <form action="https://www.youtube.com/results?" onsubmit="return validateUrl()" style="width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); transition: transform 0.3s ease-in-out; animation: fadeIn 0.8s ease-out 0.2s; margin-bottom: 20px;">
        <label for="youtube_search" style="display: block; margin-bottom: 15px; font-weight: 600; color: #555;">Search on YouTube:</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="youtube_search" placeholder="Search on YouTube" name="search_query" style="flex-grow: 1; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; transition: border-color 0.3s ease-in-out;" onfocus="this.style.borderColor='#ff0000';" onblur="this.style.borderColor='#ccc';">
            <button style="padding: 12px 20px; border: none; border-radius: 8px; background-image: linear-gradient(to right, #ff0000, #c4302b); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease-in-out;" onmouseover="this.style.transform='scale(1.05)'; this.style.boxShadow='0 4px 15px rgba(255, 0, 0, 0.3)'; " onmouseout="this.style.transform='scale(1)'; this.style.boxShadow='none';">Search</button>
        </div>
    </form>
    
    <form action="checking" style="width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); transition: transform 0.3s ease-in-out; animation: fadeIn 0.8s ease-out 0.4s; margin-bottom: 20px;">
        <div style="display: flex; align-items: center; margin-bottom: 20px;">
            <input type="checkbox" id="check" name="check_is" style="width: 20px; height: 20px; margin-right: 10px;">
            <label for="check" style="color: #333; font-weight: 500;">I agree to all the terms and regulations.</label>
        </div>
        <button style="width: 100%; padding: 12px; border: none; border-radius: 8px; background-image: linear-gradient(to right, #28a745, #1e7e34); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s ease-in-out;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 15px rgba(40, 167, 69, 0.3)'; " onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">Submit</button>
    </form>
    
    <form action="gen" style="width: 100%; max-width: 400px; padding: 30px; border-radius: 12px; background-color: #fff; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); transition: transform 0.3s ease-in-out; animation: fadeIn 0.8s ease-out 0.6s; margin-bottom: 20px;">
        <span style="font-weight: 600; color: #555;">Gender:</span>
        <div style="display: flex; gap: 20px; margin-top: 10px;">
            <div>
                <input type="radio" name="gender" id="m" style="vertical-align: middle;">
                <label for="m" style="margin-right: 15px; color: #333;">Male</label>
            </div>
            <div>
                <input type="radio" name="gender" id="f" style="vertical-align: middle;">
                <label for="f" style="margin-right: 15px; color: #333;">Female</label>
            </div>
        </div>
        
        <div style="margin-top: 20px;">
            <label for="profession" style="display: block; margin-bottom: 10px; font-weight: 600; color: #555;">Choose your profession:</label>
            <select name="profession" id="profession" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; background-color: #f8f9fa;">
                <option value="prof">Professor</option>
                <option value="stu" selected>Student</option>
                <option value="Engineer">Engineer</option>
                <option value="Dev">Developer</option>
            </select>
        </div>
        
        <div style="margin-top: 20px;">
            <label for="vol" style="display: block; margin-bottom: 10px; font-weight: 600; color: #555;">Volume settings</label>
            <input type="range" min="0" max="100" id="vol" style="width: 100%;">
        </div>
        
        <div style="margin-top: 20px;">
            <label for="feedback" style="display: block; margin-bottom: 10px; font-weight: 600; color: #555;">Please give your feedback. Thank you</label>
            <textarea id="feedback" name="feedback" rows="4" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; resize: vertical; transition: border-color 0.3s ease-in-out;" onfocus="this.style.borderColor='#007bff';" onblur="this.style.borderColor='#ccc';"></textarea>
            <button style="width: 100%; padding: 12px; border: none; border-radius: 8px; background-image: linear-gradient(to right, #6c757d, #495057); color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: transform 0.2s ease-in-out;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 15px rgba(108, 117, 125, 0.3)'; " onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';">Submit</button>
        </div>
    </form>
</body>
</html>
