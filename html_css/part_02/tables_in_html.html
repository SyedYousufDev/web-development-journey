<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table_example</title>
</head>
<body>
    <table border="black">
        <caption>Fruit Items</caption>
        <!--table header-->
        <thead>
           <tr>
            <th rowspan="2">Item</th>
            <th colspan="2">Price</th>
        </tr>
        <tr>
            <th>PKR</th>
            <th>USD</th>
        </tr>
        </thead>
         <!--table body-->
         <tbody>
             <tr>
            <td>apple</td>
            <td>45</td>
            <td>0.23</td>
        </tr>
        <tr>
            <td>orange</td>
            <td>33</td>
            <td>0.17</td>
        </tr>
        <tr>
            <td>banana</td>
            <td>12</td>
            <td>0.9</td>
        </tr>
         </tbody>
         <!-- At last we can also use <tfoot>...</tfoot>  -->
       
    </table>
</body>
</html>
